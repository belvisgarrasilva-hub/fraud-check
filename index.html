<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector de fraude con IA</title>

<style>
body {
  background: #f5f7fa;
  margin: 0;
  font-family: Arial;
}

.fv-app {
  max-width: 640px;
  margin: 60px auto;
  padding: 25px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.fv-title {
  font-size: 22px;
  font-weight: bold;
}

.fv-sub {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.fv-input {
  width: 100%;
  height: 120px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.fv-btn {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.fv-result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  background: #fafafa;
  display: none;
  text-align: center;
}

.fv-score {
  font-size: 42px;
  font-weight: bold;
}

.fv-bar {
  height: 10px;
  background: #eee;
  margin: 15px 0;
  border-radius: 5px;
}

.fv-bar-fill {
  height: 100%;
  width: 0%;
}

.seguro { color: green; }
.advertencia { color: orange; }
.peligro { color: red; }
</style>
</head>

<body>

<div class="fv-app">
  <div class="fv-title">🛡 Detector de fraude con IA</div>
  <div class="fv-sub">Pegá un texto, link o mensaje sospechoso</div>

  <textarea class="fv-input" placeholder="Ej: https://paypal-login.com"></textarea>

  <button class="fv-btn" onclick="analizar()">Analizar</button>

  <div class="fv-result" id="result">
    <div class="fv-score" id="score">0%</div>

    <div class="fv-bar">
      <div class="fv-bar-fill" id="barFill"></div>
    </div>

    <div id="veredicto"></div>
    <div id="details"></div>
  </div>
</div>

<script>
const API_URL = "https://fraud-check-psi.vercel.app/api/analyze";

async function analizar() {
  const texto = document.querySelector(".fv-input").value.trim();

  if (!texto) {
    alert("Pegá algo para analizar");
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: texto })
    });

    const data = await res.json();
    mostrarResultado(data);

  } catch (error) {
    mostrarError();
  }
}

function mostrarResultado(data) {
  const result = document.getElementById("result");
  const scoreEl = document.getElementById("score");
  const bar = document.getElementById("barFill");
  const veredicto = document.getElementById("veredicto");
  const details = document.getElementById("details");

  result.style.display = "block";

  let score = data.score ?? 0;

  scoreEl.innerText = score + "%";
  bar.style.width = score + "%";

  if (score > 70) {
    bar.style.background = "green";
    veredicto.innerText = "✔ Seguro";
    veredicto.className = "seguro";
  } else if (score > 40) {
    bar.style.background = "orange";
    veredicto.innerText = "⚠ Sospechoso";
    veredicto.className = "advertencia";
  } else {
    bar.style.background = "red";
    veredicto.innerText = "❌ Peligroso";
    veredicto.className = "peligro";
  }

  details.innerText = data.details || "";
}

function mostrarError() {
  alert("Error conectando con la API");
}
</script>

</body>
</html>
