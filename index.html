<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Fraud Checker</title><style>

body {
  background: #f5f7fa;
}

.fv-app {
  max-width: 640px;
  margin: 60px auto;
  padding: 25px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  font-family: Arial;
}

.fv-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.fv-sub {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.fv-input {
  width: 100%;
  height: 120px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  resize: none;
}

.fv-btn {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.fv-result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  background: #fafafa;
  display: none;
  text-align: center;
}

.fv-score {
  font-size: 42px;
  font-weight: bold;
}

.fv-bar {
  height: 10px;
  border-radius: 5px;
  background: #eee;
  margin: 15px 0;
  overflow: hidden;
}

.fv-fill {
  height: 100%;
  width: 0%;
  transition: width 1s ease;
}

.fv-label {
  font-weight: bold;
  margin-bottom: 10px;
}

.fv-loading {
  margin-top: 10px;
  font-size: 13px;
  color: #666;
}

</style></head>
<body><div class="fv-app">  <div class="fv-title">🔍 AI Fraud Checker</div>
  <div class="fv-sub">Analyze text or links to detect scams</div>  <textarea id="input" class="fv-input" placeholder="Paste a message or link..."></textarea><button class="fv-btn" onclick="analyze()">Analyze</button>

  <div class="fv-loading" id="loading" style="display:none;">
    Analyzing with AI...
  </div>  <div class="fv-result" id="resultBox">
    <div class="fv-label" id="label"></div><div class="fv-bar">
  <div class="fv-fill" id="bar"></div>
</div>

<div class="fv-score" id="score"></div>

<div id="details" style="margin-top:10px;font-size:14px;color:#555;"></div>

  </div></div><script>
async function analyze() {
  const input = document.getElementById("input").value.trim();

  if (!input) {
    alert("Enter text or a link");
    return;
  }

  document.getElementById("loading").style.display = "block";
  document.getElementById("resultBox").style.display = "none";

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: input })
    });

    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("resultBox").style.display = "block";

    let result = (data.result || "").toLowerCase();

    let score = 0;
    let label = "";
    let color = "";

    if (result.includes("scam")) {
      score = 90;
      label = "⚠️ Scam detected";
      color = "#ff4d4d";
    } else if (result.includes("suspicious")) {
      score = 60;
      label = "⚠️ Suspicious";
      color = "#ffaa00";
    } else {
      score = 10;
      label = "✅ Safe";
      color = "#00c853";
    }

    document.getElementById("label").innerText = label;
    document.getElementById("score").innerText = score + "%";
    document.getElementById("bar").style.width = score + "%";
    document.getElementById("bar").style.background = color;

    document.getElementById("details").innerText = data.result;

  } catch (err) {
    document.getElementById("loading").innerText = "Error analyzing";
  }
}
</script></body>
</html>
